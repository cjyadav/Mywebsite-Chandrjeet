<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>चंद्रजीत - वेलकम टू माय वेबसाइट</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: #fff;
            color: #1e3c72;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: bold;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        p {
            font-size: 16px;
            color: #e0e0e0;
            margin-bottom: 30px;
        }
        .btn-call {
            display: inline-block;
            background: #00e676;
            color: #fff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
        }
        .btn-call:hover {
            background: #00c853;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.6);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img">C</div>
        <h1>नमस्ते, मैं हूँ चंद्रजीत</h1>
        <p>मेरी पर्सनल वेबसाइट पर आपका स्वागत है। मुझसे संपर्क करने के लिए नीचे दिए गए बटन पर क्लिक करें।</p>
        <!-- आपका मोबाइल नंबर यहाँ लिंक किया गया है ताकि क्लिक करते ही सीधे कॉल लग सके -->
        <a href="tel:964332051" class="btn-call">📞 कॉल करें (964332051)</a>
    </div>

</body>
</html>
